<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperBButter - Bakery & OC</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #FFFDF5; 
  --main: #FBBF24; 
  --dark: #78350F; 
  --darker: #451A03; 
  --white: rgba(255, 255, 255, 0.95);
  --glass: rgba(255, 255, 255, 0.5); 
  --glow: rgba(251, 191, 36, 0.25); 
  --transition: 0.3s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mitr', sans-serif; }

body {
  background: var(--bg);
  background-image: linear-gradient(135deg, #FFFDF5 0%, #FFF8D6 100%);
  display: flex; justify-content: center;
  padding-bottom: 90px;
  color: var(--dark);
}

.container {
  max-width: 500px; width: 100%;
  padding: 30px 15px 50px;
}

.page { display: none; animation: fadeIn 0.4s ease; }
.page.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.section {
  backdrop-filter: blur(10px);
  background: var(--glass);
  border-radius: 25px;
  padding: 25px 20px;
  margin-bottom: 20px;
  box-shadow: 0 10px 30px rgba(120, 53, 15, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.6);
}

h1, h2, h3 { color: var(--darker); margin-bottom: 15px; font-weight: 600; }
h1 { 
  font-size: 28px; 
  background: linear-gradient(90deg, var(--darker), var(--dark)); 
  -webkit-background-clip: text; 
  -webkit-text-fill-color: transparent; 
}
.center { text-align: center; }

.nav-bar {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  width: 95%; max-width: 450px;
  backdrop-filter: blur(15px);
  background: rgba(255, 255, 255, 0.9);
  display: flex; justify-content: space-around;
  padding: 10px 5px;
  border-radius: 35px;
  box-shadow: 0 12px 30px rgba(120, 53, 15, 0.1);
  z-index: 1000;
  border: 1px solid rgba(255, 255, 255, 0.8);
}

.nav-item {
  text-decoration: none;
  color: var(--dark);
  font-size: 13px;
  font-weight: 500;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer;
  transition: var(--transition);
  padding: 8px 12px;
  border-radius: 20px;
  width: 25%;
  text-align: center;
}

.nav-item.active {
  background: var(--dark);
  color: #fff;
  box-shadow: 0 5px 15px rgba(120, 53, 15, 0.2);
}

.logo-wrapper {
  position: relative;
  width: 150px;
  height: 150px;
  margin: 0 auto 20px;
}

.logo {
  width: 100%; height: 100%;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 10px 30px var(--glow);
  transition: var(--transition);
  border: 5px solid #fff;
  position: relative;
  z-index: 2;
}
.logo img { width: 100%; height: 100%; object-fit: cover; background-color: #fff; }
.logo-wrapper:hover .logo { transform: scale(1.03) rotate(2deg); }

.floating-emoji {
  position: absolute;
  font-size: 24px;
  z-index: 5;
  animation: floatEmoji 3s ease-in-out infinite;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
}

.emoji-1 { top: -10px; left: -10px; animation-delay: 0s; font-size: 26px; } 
.emoji-2 { top: 20px; right: -20px; animation-delay: 0.7s; } 
.emoji-3 { bottom: 15px; left: -15px; animation-delay: 1.4s; } 
.emoji-4 { bottom: -5px; right: -10px; animation-delay: 2.1s; font-size: 28px; } 

@keyframes floatEmoji {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-10px) rotate(8deg); }
}

  font-size: 14px;
  line-height: 1.6;
  opacity: 0.9;
  margin-bottom: 20px;
}
.rule-box {
